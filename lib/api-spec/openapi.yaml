openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Discord Bot List API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: bots
    description: Discord bot operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /bots:
    get:
      operationId: listBots
      tags: [bots]
      summary: List all bots
      description: Returns all registered Discord bots
      responses:
        "200":
          description: List of bots
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Bot"
    post:
      operationId: createBot
      tags: [bots]
      summary: Add a new bot
      description: Register a new Discord bot
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBotInput"
      responses:
        "201":
          description: Bot created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Bot"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /bots/{id}:
    get:
      operationId: getBot
      tags: [bots]
      summary: Get a bot by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Bot found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Bot"
        "404":
          description: Bot not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteBot
      tags: [bots]
      summary: Delete a bot
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Bot deleted
        "404":
          description: Bot not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /bots/{id}/vote:
    post:
      operationId: voteBot
      tags: [bots]
      summary: Vote for a bot
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Vote counted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Bot"
        "404":
          description: Bot not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    Bot:
      type: object
      properties:
        id:
          type: integer
        clientId:
          type: string
        name:
          type: string
        description:
          type: string
        avatarUrl:
          type: string
          nullable: true
        prefix:
          type: string
          nullable: true
        tags:
          type: array
          items:
            type: string
        votes:
          type: integer
        servers:
          type: integer
        featured:
          type: boolean
        inviteUrl:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - clientId
        - name
        - description
        - tags
        - votes
        - servers
        - featured
        - inviteUrl
        - createdAt
    CreateBotInput:
      type: object
      properties:
        clientId:
          type: string
        name:
          type: string
        description:
          type: string
        avatarUrl:
          type: string
          nullable: true
        prefix:
          type: string
          nullable: true
        tags:
          type: array
          items:
            type: string
        featured:
          type: boolean
      required:
        - clientId
        - name
        - description
        - tags
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error
